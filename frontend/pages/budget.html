<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trip Budget - Traveloop</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#f4f8fb;
    }

    .sidebar{
      min-height:100vh;
      width:250px;
      background:#071739;
      color:white;
      position:fixed;
      padding:25px 20px;
    }

    .logo{
      font-size:28px;
      font-weight:700;
      margin-bottom:40px;
    }

    .logo span{
      color:#00c2a8;
    }

    .menu a{
      display:block;
      color:white;
      text-decoration:none;
      padding:13px 15px;
      border-radius:12px;
      margin-bottom:12px;
      transition:0.3s;
    }

    .menu a:hover,
    .menu .active{
      background:#00c2a8;
    }

    .main-content{
      margin-left:250px;
      padding:35px;
    }

    .top-card{
      background:
      linear-gradient(rgba(7,23,57,0.75), rgba(0,168,150,0.55)),
      url('https://images.unsplash.com/photo-1527631746610-bca00a040d60?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      color:white;
      padding:42px;
      border-radius:28px;
      margin-bottom:30px;
      box-shadow:0 8px 25px rgba(0,0,0,0.12);
    }

    .top-card h1{
      font-size:42px;
      font-weight:700;
    }

    .budget-card,
    .summary-card{
      background:white;
      border-radius:25px;
      padding:30px;
      box-shadow:0 8px 25px rgba(0,0,0,0.08);
      height:100%;
    }

    .form-control{
      height:52px;
      border-radius:12px;
    }

    .form-control:focus{
      box-shadow:none;
      border-color:#00c2a8;
    }

    .btn-main{
      background:#00c2a8;
      color:white;
      border:none;
      padding:13px 28px;
      border-radius:30px;
      font-weight:600;
      transition:0.3s;
    }

    .btn-main:hover{
      background:#009c88;
      color:white;
    }

    .summary-box{
      background:#f8fbff;
      border-radius:18px;
      padding:18px;
      margin-bottom:18px;
      border-left:5px solid #00c2a8;
    }

    .summary-box h6{
      color:#666;
      margin-bottom:6px;
    }

    .summary-box h3{
      color:#071739;
      font-weight:700;
      margin-bottom:0;
    }

    .total-box{
      background:#071739;
      color:white;
      text-align:center;
      padding:25px;
      border-radius:22px;
      margin-top:20px;
    }

    .total-box h2{
      font-size:42px;
      font-weight:700;
    }

    canvas{
      margin-top:25px;
    }

    @media(max-width:768px){

      .sidebar{
        position:relative;
        width:100%;
        min-height:auto;
      }

      .main-content{
        margin-left:0;
        padding:20px;
      }

      .top-card h1{
        font-size:32px;
      }

    }

  </style>

</head>

<body>

  <div class="sidebar">

    <div class="logo">
      TRAVEL<span>LOOP</span>
    </div>

    <div class="menu">
      <a href="dashboard.html">Dashboard</a>
      <a href="create-trip.html">Create Trip</a>
      <a href="itinerary.html">Itinerary</a>
      <a href="budget.html" class="active">Budget</a>
      <a href="checklist.html">Checklist</a>
      <a href="index.html">Logout</a>
    </div>

  </div>

  <div class="main-content">

    <div class="top-card">

      <h1>Trip Budget Planner</h1>

      <p class="mb-0">
        Estimate your travel expenses and manage your trip budget efficiently.
      </p>

    </div>

    <div class="row g-4">

      <!-- LEFT FORM -->

      <div class="col-lg-5">

        <div class="budget-card">

          <h4 class="mb-4">Add Expenses</h4>

          <form id="budgetForm">

            <div class="mb-3">

              <label class="mb-2">Transport Cost</label>

              <input
                type="number"
                id="transport"
                class="form-control"
                placeholder="Enter transport cost"
                required
              >

            </div>

            <div class="mb-3">

              <label class="mb-2">Hotel / Stay Cost</label>

              <input
                type="number"
                id="stay"
                class="form-control"
                placeholder="Enter stay cost"
                required
              >

            </div>

            <div class="mb-3">

              <label class="mb-2">Food Cost</label>

              <input
                type="number"
                id="food"
                class="form-control"
                placeholder="Enter food cost"
                required
              >

            </div>

            <div class="mb-4">

              <label class="mb-2">Activities Cost</label>

              <input
                type="number"
                id="activities"
                class="form-control"
                placeholder="Enter activities cost"
                required
              >

            </div>

            <button type="submit" class="btn-main w-100">
              Calculate Budget
            </button>

          </form>

        </div>

      </div>

      <!-- RIGHT SUMMARY -->

      <div class="col-lg-7">

        <div class="summary-card">

          <h4 class="mb-4">Budget Summary</h4>

          <div class="summary-box">
            <h6>Transport</h6>
            <h3>₹<span id="transportValue">0</span></h3>
          </div>

          <div class="summary-box">
            <h6>Hotel / Stay</h6>
            <h3>₹<span id="stayValue">0</span></h3>
          </div>

          <div class="summary-box">
            <h6>Food</h6>
            <h3>₹<span id="foodValue">0</span></h3>
          </div>

          <div class="summary-box">
            <h6>Activities</h6>
            <h3>₹<span id="activitiesValue">0</span></h3>
          </div>

          <div class="total-box">

            <h5>Total Estimated Budget</h5>

            <h2>
              ₹<span id="totalBudget">0</span>
            </h2>

          </div>

          <canvas id="budgetChart"></canvas>

        </div>

      </div>

    </div>

  </div>

  <script>

    const budgetForm = document.getElementById("budgetForm");

    let chart;

    budgetForm.addEventListener("submit", function(e){

      e.preventDefault();

      const transport =
        Number(document.getElementById("transport").value);

      const stay =
        Number(document.getElementById("stay").value);

      const food =
        Number(document.getElementById("food").value);

      const activities =
        Number(document.getElementById("activities").value);

      const total =
        transport + stay + food + activities;

      document.getElementById("transportValue").textContent = transport;

      document.getElementById("stayValue").textContent = stay;

      document.getElementById("foodValue").textContent = food;

      document.getElementById("activitiesValue").textContent = activities;

      document.getElementById("totalBudget").textContent = total;

      createChart(transport, stay, food, activities);

    });

    function createChart(transport, stay, food, activities){

      const ctx =
        document.getElementById("budgetChart");

      if(chart){
        chart.destroy();
      }

      chart = new Chart(ctx, {

        type:'pie',

        data:{

          labels:[
            'Transport',
            'Stay',
            'Food',
            'Activities'
          ],

          datasets:[{

            data:[
              transport,
              stay,
              food,
              activities
            ],

            backgroundColor:[
              '#00c2a8',
              '#071739',
              '#ffc857',
              '#4e9af1'
            ],

            borderWidth:0

          }]

        },

        options:{

          responsive:true,

          plugins:{

            legend:{
              position:'bottom'
            }

          }

        }

      });

    }

  </script>

</body>
</html>
